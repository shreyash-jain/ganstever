# Cloudflare Pages configuration.
#
# The site is a Next.js static export (`output: "export"`), so deployment is
# just plain HTML/CSS/JS — no Workers runtime or nodejs_compat flag needed.
#
# `name` must match the Cloudflare Pages project name (URL is
# <branch>.<name>.pages.dev). `pages_build_output_dir` is the folder
# `next build` writes the static export to.

name = "ganstever"
compatibility_date = "2025-09-23"
pages_build_output_dir = "out"